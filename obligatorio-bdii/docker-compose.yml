services:
  mysql:
    image: mysql:8.0
    container_name: ticketing_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ticketing_mundial
      MYSQL_USER: ticketing_user
      MYSQL_PASSWORD: ticketing_pass
      MYSQL_ROOT_PASSWORD: root_pass
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "3307:3306"
    volumes:
      - ticketing_db_data:/var/lib/mysql
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uticketing_user", "-pticketing_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ticketing_db_data: